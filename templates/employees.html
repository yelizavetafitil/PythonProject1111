<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник | РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal-responsive.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #144080; --bg: #f2f6fb; --border: #dbe5f2; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .navbar { background: white; border-bottom: 1px solid var(--border); padding: 12px 0; }
        .content { background: white; border-radius: 20px; padding: 25px; margin-top: 30px; border: 1px solid var(--border); }
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 14px 0 16px;
        }
        .search-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14);
        }
        .search-icon-wrap {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            line-height: 0;
        }
        .search-icon-wrap svg { display: block; }
        .search-box {
            flex: 1 1 auto;
            min-width: 0;
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 12px 0;
            font-size: 14px;
            line-height: 1.4;
        }
        .search-box:focus { outline: none; box-shadow: none !important; }
        .brand-title { color: var(--primary); }
        .btn-link { color: var(--primary); }
        .btn-link:hover { color: #1f4e92; }
        .employees-nav .brand-title { font-size: 1.1rem; }
        @media (max-width: 991px) {
            .employees-nav .brand-title {
                font-size: 0.9rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .content { padding: 16px; margin-top: 16px; border-radius: 14px; }
        }
        @media (max-width: 576px) {
            .employees-nav .btn-link { font-size: 14px; padding: 6px 8px; }
        }
    </style>
</head>
<body>
<nav class="navbar mb-4 employees-nav">
    <div class="container portal-navbar-inner">
        <a href="/" class="btn btn-link text-decoration-none fw-bold flex-shrink-0">← К ресурсам</a>
        <h4 class="m-0 fw-bold brand-title text-center flex-grow-1 px-2">Справочник сотрудников РУП «Белнипиэнергопром»</h4>
        <div class="small text-nowrap flex-shrink-0">Всего: <span id="cnt" class="badge" style="background:#144080;">0</span></div>
    </div>
</nav>
<div class="container">
    <div class="content">
        <div class="search-wrap">
            <span class="search-icon-wrap" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.65" y1="16.65" x2="21" y2="21"/></svg>
            </span>
            <input type="text" id="s" class="search-box" placeholder="Поиск по имени, отделу или логину..." oninput="filter()">
        </div>
        <div class="portal-table-scroll">
            <table class="table align-middle mb-0">
                <thead><tr><th>Имя</th><th>Логин</th><th>Отдел</th><th>Почта</th></tr></thead>
                <tbody id="b"><tr><td colspan="4" class="text-center py-5">Загрузка из AD...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    let u = [];
    async function load() {
        const r = await fetch('/get_all_employees');
        u = await r.json();
        document.getElementById('cnt').innerText = u.length;
        render(u);
    }
    function render(data) {
        document.getElementById('b').innerHTML = data.map(i => `<tr><td class="fw-bold">${i.name}</td><td><code class="small">${i.login}</code></td><td class="small">${i.dept}</td><td class="small">${i.mail}</td></tr>`).join('');
    }
    function filter() {
        const q = document.getElementById('s').value.toLowerCase();
        render(u.filter(i => i.name.toLowerCase().includes(q) || i.login.toLowerCase().includes(q) || i.dept.toLowerCase().includes(q)));
    }
    window.onload = load;
</script>
</body>
</html>
