<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal-responsive.css') }}">
    <style>
        :root {
            --primary: #1c4f9c;
            --primary-soft: #2a65c0;
            --bg: #edf3fb;
            --text: #1c2f4b;
            --muted-text: #667f9f;
            --border: #d8e2f0;
            --card-shadow: 0 8px 22px rgba(21, 45, 84, 0.1);
        }

        body {
            background-color: #081a48;
            background-image:
                radial-gradient(circle at 50% 42%, rgba(130, 230, 255, 0.18) 0%, rgba(130, 230, 255, 0) 48%),
                linear-gradient(180deg, rgba(8, 26, 72, 0.56) 0%, rgba(8, 26, 72, 0.66) 100%),
                url("{{ url_for('project_asset', filename='back4.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar - Clean White */
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            backdrop-filter: none;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(20, 42, 75, 0.06);
        }
        .logo { text-decoration: none; display: flex; align-items: center; justify-content: flex-start; }
        .logo img {
            width: auto;
            max-width: 100%;
            max-height: 40px;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: left center;
        }

        /* Categorized Grid - Vertical Layout (Best for Production) */
        body { overflow-x: hidden; }
        .main-container {
            margin: 0 auto;
            padding: 26px 0 34px;
            position: relative;
            width: 100%;
        }

        .portal-body {
            display: grid;
            grid-template-columns: 178px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
        }

        /* Курсы НБ РБ */
        .nbrb-rates-panel {
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 78px;
            width: 100%;
            max-height: calc(100vh - 92px);
            overflow: hidden;
            padding: 12px 12px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(205, 220, 243, 0.88);
            backdrop-filter: blur(3px);
            box-shadow: 0 8px 20px rgba(17, 46, 90, 0.08);
        }
        .nbrb-rates-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #dfe8f5;
            flex-shrink: 0;
        }
        .nbrb-rates-title {
            font-weight: 700;
            font-size: 13px;
            color: #5a7090;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nbrb-date-row input[type="date"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            color: var(--text);
            background: #fff;
        }
        .nbrb-rates-table-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }
        .nbrb-rates-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .nbrb-rates-table th {
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            color: #6b81a2;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0 4px 8px;
            border-bottom: 1px solid #e8eef7;
        }
        .nbrb-rates-table th:last-child,
        .nbrb-rates-table td:last-child {
            text-align: right;
        }
        .nbrb-rates-table td {
            padding: 6px 2px;
            border-bottom: 1px solid #eef3fa;
            vertical-align: middle;
        }
        .nbrb-rates-table tr:last-child td {
            border-bottom: none;
        }
        .nbrb-code {
            font-weight: 700;
            color: #1c4f9c;
            white-space: nowrap;
        }
        .nbrb-name {
            display: none;
        }
        .nbrb-value {
            font-weight: 600;
            color: #1c2f4b;
            white-space: nowrap;
        }
        .nbrb-rates-status {
            font-size: 12px;
            color: #6b81a2;
            padding: 8px 0;
        }
        .nbrb-rates-status.is-error {
            color: #b42318;
        }

        #resourcesGrid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            align-items: start;
            min-width: 0;
        }

        .category-group {
            margin-bottom: 0;
            padding: 12px 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(205, 220, 243, 0.88);
            backdrop-filter: blur(3px);
            box-shadow: 0 8px 20px rgba(17, 46, 90, 0.08);
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }
        .category-header {
            font-weight: 700; font-size: 12px; color: #5a7090;
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 10px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #dfe8f5; padding-bottom: 8px;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* Production Resource Card */
        .resource-card {
            position: relative;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            transition: all 0.2s ease-in-out;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .resource-card:hover {
            border-color: #98b8e5;
            box-shadow: 0 12px 22px rgba(17, 46, 90, 0.14);
            transform: translateY(-1px);
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            height: 100%;
        }

        .icon-container {
            width: 36px; height: 36px;
            background: #f4f7fc;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border: 1px solid #dde7f5;
        }
        .tile-icon { width: 20px; height: 20px; object-fit: contain; }

        .card-body { flex-grow: 1; min-width: 0; }
        .card-title {
            font-weight: 600;
            font-size: 13px;
            margin: 0 0 3px 0;
            color: var(--text);
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .card-desc {
            font-size: 11px;
            color: var(--muted-text);
            line-height: 1.35;
            margin: 0;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Планшет: курсы — такой же блок в сетке с разделами (2 колонки) */
        @media (max-width: 1199px) {
            .portal-body {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                align-items: start;
            }
            #resourcesGrid {
                display: contents;
            }
            .nbrb-rates-panel {
                position: static;
                max-height: none;
            }
        }

        /* Узкий планшет / большой телефон */
        @media (max-width: 767px) {
            .main-container {
                padding: 16px 0 28px;
            }
            .search-container {
                max-width: none;
                margin-bottom: 16px;
                padding: 0 14px 0 16px;
            }
            .search-bar {
                padding: 11px 0;
                font-size: 16px;
            }
            .portal-body {
                grid-template-columns: 1fr;
            }
            .category-group {
                padding: 12px;
            }
            .resource-card {
                padding: 12px 14px;
            }
            .card-title {
                font-size: 14px;
            }
            .card-desc {
                font-size: 12px;
                -webkit-line-clamp: 3;
            }
            .group-checklist {
                grid-template-columns: 1fr;
            }
            .modal-body,
            .modal-header {
                padding: 16px;
            }
        }

        /* Телефон */
        @media (max-width: 480px) {
            .navbar {
                padding: 8px 0;
            }
        }

        /* Admin Controls - Discreet */
        .admin-hud {
            position: absolute; top: 12px; right: 12px;
            display: flex; gap: 4px; opacity: 0; transition: 0.2s;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .resource-card:hover .admin-hud { opacity: 1; }
        .hud-btn {
            min-height: 28px;
            border-radius: 8px;
            padding: 4px 8px;
            background: #fff; border: 1px solid #d6e3f7;
            color: #5f738f; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
        }
        .hud-btn:hover { background: #f2f7ff; color: var(--primary); border-color: #8db8ff; }
        .btn-delete:hover { color: #c83939; border-color: #ef9d9d; background: #fff3f3; }
        .hud-btn-text { white-space: nowrap; }

        /* Search Bar - flex: иконка и текст по одной вертикали */
        .search-container {
            max-width: 620px;
            margin: 0 auto 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0 16px 0 18px;
            box-shadow: 0 8px 20px rgba(17, 46, 90, 0.1);
            transition: 0.2s;
        }
        .search-container:focus-within {
            border-color: #94b4e4;
            box-shadow: 0 0 0 3px rgba(98, 141, 209, 0.14), 0 10px 20px rgba(17, 46, 90, 0.12);
        }
        .search-icon-wrap {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8aa1bf;
            line-height: 0;
        }
        .search-icon-wrap svg { display: block; }
        .search-bar {
            flex: 1 1 auto;
            min-width: 0;
            width: auto;
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 12px 0;
            font-size: 14px;
            line-height: 1.4;
            color: var(--text);
        }
        .search-bar::placeholder { color: #97aac4; }
        .search-bar:focus { outline: none; box-shadow: none !important; }

        /* Modal Overrides */
        .modal-content { border-radius: 12px; border: none; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .modal-header { border-bottom: 1px solid var(--border); padding: 20px 24px; }
        .modal-body { padding: 24px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid var(--border); padding: 10px 12px; font-size: 14px; }
        .form-control:focus { border-color: var(--primary); box-shadow: none; }
        .btn-primary { background: var(--primary); border: none; border-radius: 8px; font-weight: 600; padding: 10px 20px; }
        .btn-primary:hover { background: var(--primary-soft); }
        .btn-primary:focus, .btn-outline-secondary:focus, .btn-light:focus {
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.18) !important;
        }
        .btn-outline-secondary {
            color: var(--primary);
            border-color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-outline-secondary:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-light {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-light:hover {
            background: var(--primary-soft);
            border-color: var(--primary-soft);
            color: #fff;
        }
        .topbar-user {
            font-size: 15px;
            line-height: 1;
            color: #4d678b !important;
            margin-right: 4px !important;
        }
        .topbar-btn {
            height: 40px;
            border-radius: 10px !important;
            padding: 0 16px !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .topbar-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50% !important;
            padding: 0 !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 2px !important;
        }

        .group-checklist {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            background: #f8fafc; padding: 16px; border-radius: 10px; border: 1px solid var(--border);
            max-height: 160px; overflow-y: auto;
        }
        .group-checklist label { font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #475569; }
        .group-dropdown { position: relative; }
        .group-dropdown-btn {
            width: 100%;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #334155;
            gap: 10px;
            cursor: pointer;
        }
        .group-dropdown-btn span {
            overflow: visible;
            text-overflow: clip;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.3;
            text-align: left;
        }
        .group-dropdown-btn:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14); }
        .group-dropdown-menu {
            display: none;
            position: absolute;
            z-index: 20;
            width: 100%;
            margin-top: 6px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
            padding: 10px;
            max-height: 220px;
            overflow-y: auto;
        }
        .group-search-wrap {
            --group-search-h: 36px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 10px;
            margin-bottom: 8px;
            background: #fff;
            min-height: var(--group-search-h);
        }
        .group-search-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14);
        }
        .group-search-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: stretch;
            color: #94a3b8;
            line-height: 0;
        }
        .group-search-icon svg {
            display: block;
            width: 14px;
            height: 14px;
        }
        .group-search {
            flex: 1 1 auto;
            min-width: 0;
            width: 100%;
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            margin: 0;
            padding: 0;
            height: var(--group-search-h);
            line-height: var(--group-search-h);
            font-size: 13px;
        }
        .group-search:focus { outline: none; box-shadow: none !important; }
        .group-dropdown.open .group-dropdown-menu { display: block; }
        .category-new-wrap { margin-top: 8px; }
        .category-new-wrap.hidden { display: none; }
        .group-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-radius: 0;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .group-option + .group-option { border-top: 1px solid #eef2f7; }
        .group-option:hover { background: #f8fafc; }
        .group-option.selected {
            background: #e9f0fb;
            color: #0f3b79;
            border-color: transparent;
        }
        .group-check-icon { opacity: 0; color: var(--primary); }
        .group-option.selected .group-check-icon { opacity: 1; }
        .category-option.selected .group-check-icon { opacity: 1; }
        .category-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-radius: 0;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .category-option + .category-option { border-top: 1px solid #eef2f7; }
        .category-option:hover { background: #f8fafc; }
        .category-option.selected {
            background: #e9f0fb;
            color: #0f3b79;
            border-color: transparent;
        }

    </style>
</head>
<body class="portal-bg-fixed {{ 'is-admin' if can_manage_resources else '' }}">

<nav class="navbar">
    <div class="container portal-navbar-inner">
        <a href="/" class="logo"><img src="{{ url_for('project_logo') }}" alt="Логотип РУП Белнипиэнергопром"></a>
        <div class="topbar-actions">
            <span class="topbar-user fw-medium text-muted d-none d-md-inline">{{ user }}</span>
            {% if is_admin %}
                <a href="/manage" class="btn btn-outline-secondary btn-sm topbar-btn">
                    <span class="d-none d-xl-inline">Администрирование</span>
                    <span class="d-inline d-xl-none">Админ</span>
                </a>
                <a href="/manage/categories" class="btn btn-outline-secondary btn-sm topbar-btn">
                    <span class="d-none d-sm-inline">Разделы</span>
                    <span class="d-inline d-sm-none">Разд.</span>
                </a>
            {% endif %}
            {% if can_manage_resources %}
                <button class="btn btn-primary btn-sm topbar-btn" data-bs-toggle="modal" data-bs-target="#addModal">
                    <span class="d-none d-lg-inline">+ Добавить ресурс</span>
                    <span class="d-none d-sm-inline d-lg-none">+ Ресурс</span>
                    <span class="d-inline d-sm-none">+</span>
                </button>
            {% endif %}
            <a href="/logout" class="btn btn-light btn-sm topbar-icon-btn" title="Выход"><i data-lucide="log-out" size="16"></i></a>
        </div>
    </div>
</nav>

<div class="container main-container">
    <div class="search-container">
        <span class="search-icon-wrap" aria-hidden="true"><i data-lucide="search" size="18"></i></span>
        <input type="text" id="searchInput" class="search-bar" placeholder="Поиск сервисов и систем...">
    </div>
    <div class="portal-body">
        <aside class="nbrb-rates-panel" aria-label="Курсы валют НБ РБ">
            <div class="nbrb-rates-header">
                <div class="nbrb-rates-title"><i data-lucide="landmark" size="14"></i> Курсы НБ РБ</div>
                <div class="nbrb-date-row">
                    <input type="date" id="nbrbDateInput" max="" aria-label="Дата курса">
                </div>
            </div>
            <div id="nbrbRatesStatus" class="nbrb-rates-status" hidden></div>
            <div class="nbrb-rates-table-wrap">
                <table class="nbrb-rates-table" id="nbrbRatesTable" hidden>
                    <thead>
                        <tr>
                            <th>Валюта</th>
                            <th>BYN</th>
                        </tr>
                    </thead>
                    <tbody id="nbrbRatesBody"></tbody>
                </table>
            </div>
        </aside>
        <div id="resourcesGrid"></div>
    </div>
</div>

{% if can_manage_resources %}
<div class="modal fade" id="addModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
    <div class="modal-header"><h6 class="modal-title fw-bold">Добавление ресурса</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="addForm" novalidate>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">НАИМЕНОВАНИЕ РЕСУРСА</label><input type="text" name="title" class="form-control" placeholder="Например: Почта, CRM, Service Desk" required></div>
        <div class="mb-3">
            <label class="small fw-bold text-muted mb-1">РАЗДЕЛ</label>
            <div class="group-dropdown" id="addCategoryDropdown">
                <button class="group-dropdown-btn" type="button" onclick="toggleCategoryDropdown('addCategoryDropdown')">
                    <span id="addCategoryLabel">Выберите раздел</span>
                    <i data-lucide="chevron-down" size="16"></i>
                </button>
                <div class="group-dropdown-menu" id="addCategoryOptions"></div>
            </div>
            <input type="hidden" name="category_existing" id="addCategoryValue">
            <div id="addCategoryNewWrap" class="category-new-wrap hidden">
                <input type="text" name="category_new" id="addCategoryNew" class="form-control" placeholder="Введите название нового раздела">
            </div>
        </div>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">URL</label><input type="text" name="url" class="form-control" placeholder="https://... или /tabel" required></div>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">КРАТКОЕ ОПИСАНИЕ</label><textarea name="desc" class="form-control" rows="2" placeholder="Коротко: для чего используется ресурс"></textarea></div>
        <div class="mb-3">
            <label class="small fw-bold text-muted mb-2">ДОСТУП ДЛЯ ГРУПП</label>
            <div class="group-dropdown" id="addGroupsDropdown">
                <button class="group-dropdown-btn" type="button" onclick="toggleGroupDropdown('addGroupsDropdown')">
                    <span id="addGroupsLabel">Выберите группы доступа</span>
                    <i data-lucide="chevron-down" size="16"></i>
                </button>
                <div class="group-dropdown-menu" id="addGroups"></div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-2">Сохранить ресурс</button>
    </form></div>
</div></div></div>

<div class="modal fade" id="editModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
    <div class="modal-header"><h6 class="modal-title fw-bold">Редактирование ресурса</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="editForm" novalidate>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">НАИМЕНОВАНИЕ РЕСУРСА</label><input type="text" name="title" id="e_title" class="form-control" required></div>
        <div class="mb-3">
            <label class="small fw-bold text-muted mb-1">РАЗДЕЛ</label>
            <div class="group-dropdown" id="editCategoryDropdown">
                <button class="group-dropdown-btn" type="button" onclick="toggleCategoryDropdown('editCategoryDropdown')">
                    <span id="editCategoryLabel">Выберите раздел</span>
                    <i data-lucide="chevron-down" size="16"></i>
                </button>
                <div class="group-dropdown-menu" id="editCategoryOptions"></div>
            </div>
            <input type="hidden" name="category_existing" id="editCategoryValue">
            <div id="editCategoryNewWrap" class="category-new-wrap hidden">
                <input type="text" name="category_new" id="editCategoryNew" class="form-control" placeholder="Введите название нового раздела">
            </div>
        </div>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">URL</label><input type="text" name="url" id="e_url" class="form-control" placeholder="https://... или /tabel" required></div>
        <div class="mb-3"><label class="small fw-bold text-muted mb-1">КРАТКОЕ ОПИСАНИЕ</label><textarea name="desc" id="e_desc" class="form-control" rows="2"></textarea></div>
        <div class="mb-3">
            <label class="small fw-bold text-muted mb-2">ДОСТУП ДЛЯ ГРУПП</label>
            <div class="group-dropdown" id="editGroupsDropdown">
                <button class="group-dropdown-btn" type="button" onclick="toggleGroupDropdown('editGroupsDropdown')">
                    <span id="editGroupsLabel">Выберите группы доступа</span>
                    <i data-lucide="chevron-down" size="16"></i>
                </button>
                <div class="group-dropdown-menu" id="editGroups"></div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-2">Сохранить изменения</button>
    </form></div>
</div></div></div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">Подтверждение удаления</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="confirmModalText" class="mb-0 text-secondary">Удалить этот ресурс?</p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="confirmModalOk">Удалить</button>
            </div>
        </div>
    </div>
</div>
{% endif %}

<script>
    function renderIcons() {
        const iconPaths = {
            search: '<circle cx="11" cy="11" r="7"></circle><line x1="16.65" y1="16.65" x2="21" y2="21"></line>',
            layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline>',
            settings: '<circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1z"></path>',
            'trash-2': '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path>',
            'chevron-down': '<polyline points="6 9 12 15 18 9"></polyline>',
            'log-out': '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>',
            check: '<polyline points="20 6 9 17 4 12"></polyline>',
            phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.86 19.86 0 0 1 3.1 5.18 2 2 0 0 1 5.09 3h3a2 2 0 0 1 2 1.72c.12.89.33 1.76.62 2.6a2 2 0 0 1-.45 2.1L9 10.91a16 16 0 0 0 4.09 4.09l1.49-1.26a2 2 0 0 1 2.1-.45c.84.29 1.71.5 2.6.62A2 2 0 0 1 22 16.92z"></path>',
            mail: '<rect x="3" y="5" width="18" height="14" rx="2"></rect><polyline points="3 7 12 13 21 7"></polyline>',
            globe: '<circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15 15 0 0 1 0 20"></path><path d="M12 2a15 15 0 0 0 0 20"></path>',
            calendar: '<rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>',
            clipboard: '<rect x="8" y="2" width="8" height="4" rx="1"></rect><path d="M9 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3"></path><line x1="9" y1="12" x2="15" y2="12"></line><line x1="9" y1="16" x2="15" y2="16"></line>',
            dumbbell: '<path d="M14.4 14.4 9.6 9.6"></path><path d="M18 4l2 2"></path><path d="M2 20l2 2"></path><path d="M20 2l2 2"></path><path d="M4 18l2 2"></path><path d="M15.5 8.5l3-3"></path><path d="M8.5 15.5l-3 3"></path><path d="M12 12l-1 1"></path>',
            book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>',
            truck: '<rect x="1" y="3" width="15" height="13" rx="2"></rect><path d="M16 8h4l3 3v5h-7z"></path><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>',
            landmark: '<line x1="3" y1="22" x2="21" y2="22"></line><line x1="6" y1="18" x2="6" y2="11"></line><line x1="10" y1="18" x2="10" y2="11"></line><line x1="14" y1="18" x2="14" y2="11"></line><line x1="18" y1="18" x2="18" y2="11"></line><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>'
        };
        document.querySelectorAll('[data-lucide]').forEach((el) => {
            const name = el.getAttribute('data-lucide');
            const svgPath = iconPaths[name];
            if (!svgPath) return;
            const size = el.getAttribute('size') || 16;
            el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgPath}</svg>`;
        });
    }
    renderIcons();
    const canManageResources = {{ 'true' if can_manage_resources else 'false' }};
    let allResources = [];
    let allCategories = [];
    const DEFAULT_RESOURCE_ICON = "data:image/svg+xml;utf8," + encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23256ec8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='3' width='18' height='18' rx='4' ry='4' fill='%23eef5ff'/><path d='M8 12h8'/><path d='M8 8h8'/><path d='M8 16h5'/></svg>"
    );

    function getIcon(url) {
        try {
            const parsed = new URL(url, window.location.origin);
            if (parsed.origin === window.location.origin) return DEFAULT_RESOURCE_ICON;
            return `https://www.google.com/s2/favicons?sz=64&domain_url=${parsed.hostname}`;
        } catch {
            return DEFAULT_RESOURCE_ICON;
        }
    }
    const INTERNAL_ICON_BY_PATH = {
        '/phonebook': 'phone',
        '/meeting-rooms': 'calendar',
        '/tabel': 'clipboard',
        '/gym-booking': 'dumbbell',
        '/knowledge-base': 'book',
        '/driver-trips': 'truck',
        '/ai-assistant': 'book'
    };

    function getResourceIconName(item) {
        try {
            const parsed = new URL(item.url || '', window.location.origin);
            if (parsed.origin !== window.location.origin) return '';
            const normalizedPath = parsed.pathname.replace(/\/+$/, '') || '/';
            return INTERNAL_ICON_BY_PATH[normalizedPath] || '';
        } catch {
            return '';
        }
    }

    async function loadResources() {
        const q = document.getElementById('searchInput').value;
        const res = await fetch(`/get_resources?search=${encodeURIComponent(q)}`);
        allResources = await res.json();
        const grid = document.getElementById('resourcesGrid');
        const cats = [...new Set(allResources.map(r => r.category))].sort();

        grid.innerHTML = cats.map(cat => `
            <div class="category-group">
                <div class="category-header"><i data-lucide="layers" size="14"></i> ${cat}</div>
                <div class="resource-grid sortable-list">
                    ${allResources.filter(r => r.category === cat).map(item => `
                        <div class="resource-card" data-id="${item.id}">
                            ${canManageResources ? `<div class="admin-hud"><button type="button" class="hud-btn" onclick="openEdit(${item.id})"><i data-lucide="settings" size="13"></i></button><button type="button" class="hud-btn btn-delete" onclick="delItem(${item.id})"><i data-lucide="trash-2" size="13"></i></button></div>` : ''}
                            <a href="${item.url}" target="_blank" class="card-link">
                                <div class="icon-container">
                                    ${getResourceIconName(item)
                                        ? `<i data-lucide="${getResourceIconName(item)}" size="20"></i>`
                                        : `<img src="${getIcon(item.url)}" class="tile-icon" onerror="this.src=DEFAULT_RESOURCE_ICON">`}
                                </div>
                                <div class="card-body">
                                    <h6 class="card-title">${item.title}</h6>
                                    <p class="card-desc">${item.desc || ''}</p>
                                </div>
                            </a>
                        </div>`).join('')}
                </div>
            </div>`).join('');
        renderIcons();
        if (canManageResources) document.querySelectorAll('.sortable-list').forEach(l => new Sortable(l, { group: 'shared', animation: 150, onEnd: saveOrder }));
    }

    async function loadGroups() {
        const res = await fetch('/get_groups');
        const groups = await res.json();
        const optionsHtml = groups.map(g => `
            <div class="group-option" data-value="${g.id}" data-name="${g.name}" onclick="toggleGroupOption(this)">
                <span>${g.name}</span>
                <i data-lucide="check" class="group-check-icon" size="16"></i>
            </div>`).join('');
        const html = `
            <div class="group-search-wrap">
                <span class="group-search-icon" aria-hidden="true"><i data-lucide="search" size="14"></i></span>
                <input type="text" class="group-search" placeholder="Поиск группы..." oninput="filterGroupOptions(this)">
            </div>
            ${optionsHtml}
        `;
        if(canManageResources) {
            document.getElementById('addGroups').innerHTML = html;
            document.getElementById('editGroups').innerHTML = html;
            bindGroupInputs('addGroups');
            bindGroupInputs('editGroups');
            renderIcons();
            updateGroupLabels();
        }
    }
    function categoryOptionsHtml(current = '') {
        const sorted = [...new Set(allCategories)].sort((a, b) => a.localeCompare(b, 'ru'));
        const items = [{ value: '__new__', label: '+ Создать новый раздел' }]
            .concat(sorted.map(cat => ({ value: cat, label: cat })));
        const optionsHtml = items.map(item => `
            <div class="category-option ${item.value === current ? 'selected' : ''}"
                 data-value="${item.value}"
                 data-label="${item.label}"
                 onclick="selectCategoryOption(this)">
                <span>${item.label}</span>
                <i data-lucide="check" class="group-check-icon" size="16"></i>
            </div>
        `).join('');
        return `
            <div class="group-search-wrap">
                <span class="group-search-icon" aria-hidden="true"><i data-lucide="search" size="14"></i></span>
                <input type="text" class="group-search" placeholder="Поиск раздела..." oninput="filterCategoryOptions(this)">
            </div>
            ${optionsHtml}
        `;
    }
    async function loadCategories() {
        const res = await fetch('/get_categories');
        allCategories = await res.json();
        const addOptions = document.getElementById('addCategoryOptions');
        const editOptions = document.getElementById('editCategoryOptions');
        if (addOptions) addOptions.innerHTML = categoryOptionsHtml('');
        if (editOptions) editOptions.innerHTML = categoryOptionsHtml('');
        setCategoryValue('add', '');
        setCategoryValue('edit', '');
        renderIcons();
    }
    function setCategoryValue(mode, value) {
        const hidden = document.getElementById(mode === 'add' ? 'addCategoryValue' : 'editCategoryValue');
        const label = document.getElementById(mode === 'add' ? 'addCategoryLabel' : 'editCategoryLabel');
        const optionsWrap = document.getElementById(mode === 'add' ? 'addCategoryOptions' : 'editCategoryOptions');
        if (hidden) hidden.value = value;
        if (label) {
            if (!value) label.textContent = 'Выберите раздел';
            else if (value === '__new__') label.textContent = '+ Создать новый раздел';
            else label.textContent = value;
        }
        if (optionsWrap) {
            optionsWrap.querySelectorAll('.category-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.value === value);
            });
        }
        toggleCategoryInput(mode, value);
    }
    function toggleCategoryInput(mode, value) {
        const isNew = value === '__new__';
        const wrap = document.getElementById(mode === 'add' ? 'addCategoryNewWrap' : 'editCategoryNewWrap');
        const input = document.getElementById(mode === 'add' ? 'addCategoryNew' : 'editCategoryNew');
        if (!wrap || !input) return;
        wrap.classList.toggle('hidden', !isNew);
        input.required = isNew;
        if (!isNew) input.value = '';
    }
    function toggleCategoryDropdown(id) {
        document.querySelectorAll('.group-dropdown').forEach(el => {
            if (el.id !== id) el.classList.remove('open');
        });
        const dropdown = document.getElementById(id);
        const willOpen = !dropdown.classList.contains('open');
        dropdown.classList.toggle('open');
        if (willOpen) resetDropdownSearch(dropdown, '.category-option');
    }
    function selectCategoryOption(el) {
        const menu = el.closest('.group-dropdown-menu');
        const mode = menu.id === 'addCategoryOptions' ? 'add' : 'edit';
        setCategoryValue(mode, el.dataset.value);
        menu.closest('.group-dropdown').classList.remove('open');
    }
    function filterCategoryOptions(input) {
        const q = input.value.trim().toLowerCase();
        const options = input.closest('.group-dropdown-menu').querySelectorAll('.category-option');
        options.forEach(opt => {
            const visible = opt.dataset.label.toLowerCase().includes(q);
            opt.style.display = visible ? 'flex' : 'none';
        });
    }
    function resetDropdownSearch(dropdownEl, optionsSelector) {
        const search = dropdownEl.querySelector('.group-search');
        if (search) search.value = '';
        dropdownEl.querySelectorAll(optionsSelector).forEach(opt => { opt.style.display = 'flex'; });
    }
    function filterGroupOptions(input) {
        const q = input.value.trim().toLowerCase();
        const options = input.closest('.group-dropdown-menu').querySelectorAll('.group-option');
        options.forEach(opt => {
            const visible = opt.dataset.name.toLowerCase().includes(q);
            opt.style.display = visible ? 'flex' : 'none';
        });
    }

    function openEdit(id) {
        const item = allResources.find(r => r.id == id);
        const f = document.getElementById('editForm');
        f.dataset.id = item.id;
        document.getElementById('e_title').value = item.title;
        document.getElementById('e_url').value = item.url;
        document.getElementById('e_desc').value = item.desc || '';
        const editOptions = document.getElementById('editCategoryOptions');
        const editNewInput = document.getElementById('editCategoryNew');
        if (editOptions) {
            if (allCategories.includes(item.category)) {
                editOptions.innerHTML = categoryOptionsHtml(item.category);
                setCategoryValue('edit', item.category);
            } else {
                editOptions.innerHTML = categoryOptionsHtml('__new__');
                setCategoryValue('edit', '__new__');
                if (editNewInput) editNewInput.value = item.category;
            }
            renderIcons();
        }
        const curGids = item.group_ids ? item.group_ids.split(',') : [];
        document.querySelectorAll('#editGroups .group-option').forEach(opt => {
            opt.classList.toggle('selected', curGids.includes(opt.dataset.value));
        });
        syncHiddenInputs('editGroups');
        updateGroupLabels();
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    let confirmModal;
    let confirmModalResolver = null;

    function initConfirmModal() {
        const confirmEl = document.getElementById('confirmModal');
        if (!confirmEl) return;
        const confirmText = document.getElementById('confirmModalText');
        const confirmOk = document.getElementById('confirmModalOk');
        confirmModal = new bootstrap.Modal(confirmEl);
        confirmOk.addEventListener('click', () => {
            if (confirmModalResolver) {
                confirmModalResolver(true);
                confirmModalResolver = null;
            }
            confirmModal.hide();
        });
        confirmEl.addEventListener('hidden.bs.modal', () => {
            if (confirmModalResolver) {
                confirmModalResolver(false);
                confirmModalResolver = null;
            }
        });
        window.showDeleteConfirm = (message) => {
            confirmText.textContent = message;
            confirmModal.show();
            return new Promise((resolve) => { confirmModalResolver = resolve; });
        };
    }

    async function delItem(id) {
        const shouldDelete = await showDeleteConfirm('Удалить этот ресурс?');
        if (!shouldDelete) return;
        await fetch(`/delete/${id}`, { method: 'POST' });
        loadResources();
    }

    if (canManageResources) {
        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const addUrlInput = e.target.querySelector('input[name="url"]');
            if (!addUrlInput || !addUrlInput.value.trim()) {
                addUrlInput?.focus();
                return;
            }
            await fetch('/add', { method: 'POST', body: new FormData(e.target) });
            await loadCategories();
            loadResources();
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            e.target.reset();
            document.querySelectorAll('#addGroups .group-option').forEach(opt => opt.classList.remove('selected'));
            syncHiddenInputs('addGroups');
            updateGroupLabels();
            const addOptions = document.getElementById('addCategoryOptions');
            if (addOptions) addOptions.innerHTML = categoryOptionsHtml('');
            setCategoryValue('add', '');
            renderIcons();
        };
        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const editUrlInput = e.target.querySelector('input[name="url"]');
            if (!editUrlInput || !editUrlInput.value.trim()) {
                editUrlInput?.focus();
                return;
            }
            await fetch(`/edit/${e.target.dataset.id}`, { method: 'POST', body: new FormData(e.target) });
            await loadCategories();
            loadResources();
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        };
        async function saveOrder() {
            const order = [];
            document.querySelectorAll('#resourcesGrid .category-group').forEach(s => {
                const cat = s.querySelector('.category-header').innerText.trim();
                s.querySelectorAll('[data-id]').forEach(i => order.push({ id: parseInt(i.dataset.id), category: cat }));
            });
            await fetch('/reorder', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(order) });
        }

        const addModalEl = document.getElementById('addModal');
        const editModalEl = document.getElementById('editModal');
        addModalEl.addEventListener('hidden.bs.modal', () => {
            const form = document.getElementById('addForm');
            form.reset();
            document.querySelectorAll('#addGroups .group-option').forEach(opt => opt.classList.remove('selected'));
            syncHiddenInputs('addGroups');
            updateGroupLabels();
            const addOptions = document.getElementById('addCategoryOptions');
            if (addOptions) addOptions.innerHTML = categoryOptionsHtml('');
            setCategoryValue('add', '');
            document.getElementById('addGroupsDropdown').classList.remove('open');
            document.getElementById('addCategoryDropdown').classList.remove('open');
            renderIcons();
        });
        editModalEl.addEventListener('hidden.bs.modal', () => {
            const form = document.getElementById('editForm');
            form.reset();
            delete form.dataset.id;
            document.querySelectorAll('#editGroups .group-option').forEach(opt => opt.classList.remove('selected'));
            syncHiddenInputs('editGroups');
            updateGroupLabels();
            const editOptions = document.getElementById('editCategoryOptions');
            if (editOptions) editOptions.innerHTML = categoryOptionsHtml('');
            setCategoryValue('edit', '');
            document.getElementById('editGroupsDropdown').classList.remove('open');
            document.getElementById('editCategoryDropdown').classList.remove('open');
            renderIcons();
        });
    }
    function toggleGroupDropdown(id) {
        document.querySelectorAll('.group-dropdown').forEach(el => {
            if (el.id !== id) el.classList.remove('open');
        });
        const dropdown = document.getElementById(id);
        const willOpen = !dropdown.classList.contains('open');
        dropdown.classList.toggle('open');
        if (willOpen) resetDropdownSearch(dropdown, '.group-option');
    }
    function updateGroupLabels() {
        const addSelectedNodes = [...document.querySelectorAll('#addGroups .group-option.selected')];
        const editSelectedNodes = [...document.querySelectorAll('#editGroups .group-option.selected')];
        const addSelected = addSelectedNodes.length;
        const editSelected = editSelectedNodes.length;
        const addLabel = document.getElementById('addGroupsLabel');
        const editLabel = document.getElementById('editGroupsLabel');
        if (addLabel) {
            addLabel.textContent = addSelected
                ? addSelectedNodes.map(n => n.dataset.name).join(', ')
                : 'Выберите группы доступа';
        }
        if (editLabel) {
            editLabel.textContent = editSelected
                ? editSelectedNodes.map(n => n.dataset.name).join(', ')
                : 'Выберите группы доступа';
        }
    }
    function bindGroupInputs(containerId) {
        const container = document.getElementById(containerId);
        container.querySelectorAll('input[type="hidden"][name="access_group_ids"]').forEach(i => i.remove());
        syncHiddenInputs(containerId);
    }
    function syncHiddenInputs(containerId) {
        const container = document.getElementById(containerId);
        container.querySelectorAll('input[type="hidden"][name="access_group_ids"]').forEach(i => i.remove());
        container.querySelectorAll('.group-option.selected').forEach(opt => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'access_group_ids';
            input.value = opt.dataset.value;
            container.appendChild(input);
        });
    }
    function toggleGroupOption(el) {
        el.classList.toggle('selected');
        const containerId = el.closest('.group-dropdown-menu').id;
        syncHiddenInputs(containerId);
        updateGroupLabels();
    }
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.group-dropdown')) {
            document.querySelectorAll('.group-dropdown').forEach(el => el.classList.remove('open'));
        }
    });
    document.getElementById('searchInput').oninput = loadResources;

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function nbrbTodayIso() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function formatNbrbDateRu(iso) {
        if (!iso || !iso.includes('-')) return iso;
        const [y, m, d] = iso.split('-');
        return `${d}.${m}.${y}`;
    }

    async function loadNbrbRates() {
        const dateInput = document.getElementById('nbrbDateInput');
        const statusEl = document.getElementById('nbrbRatesStatus');
        const tableEl = document.getElementById('nbrbRatesTable');
        const bodyEl = document.getElementById('nbrbRatesBody');
        if (!dateInput || !statusEl || !bodyEl) return;
        const dateVal = dateInput.value || nbrbTodayIso();
        statusEl.classList.remove('is-error');
        statusEl.hidden = false;
        statusEl.textContent = 'Загрузка…';
        if (tableEl) tableEl.hidden = true;
        try {
            const r = await fetch(`/api/nbrb-rates?date=${encodeURIComponent(dateVal)}`);
            const data = await r.json();
            if (!r.ok || !data.success) {
                statusEl.classList.add('is-error');
                statusEl.hidden = false;
                statusEl.textContent = data.error || 'Не удалось загрузить курсы';
                return;
            }
            if (!data.rates || !data.rates.length) {
                statusEl.hidden = false;
                statusEl.textContent = `Нет данных на ${formatNbrbDateRu(data.date)}`;
                return;
            }
            statusEl.hidden = true;
            statusEl.textContent = '';
            bodyEl.innerHTML = data.rates.map((row) => `<tr>
                    <td><span class="nbrb-code">${escapeHtml(row.code)}</span><span class="nbrb-name">${escapeHtml(row.name)}</span></td>
                    <td><div class="nbrb-value">${escapeHtml(row.rate_display)}</div></td>
                </tr>`).join('');
            if (tableEl) tableEl.hidden = false;
            renderIcons();
        } catch (e) {
            statusEl.classList.add('is-error');
            statusEl.hidden = false;
            statusEl.textContent = 'Ошибка связи с сервером';
        }
    }

    function initNbrbRatesWidget() {
        const dateInput = document.getElementById('nbrbDateInput');
        if (!dateInput) return;
        const today = nbrbTodayIso();
        dateInput.max = today;
        if (!dateInput.value) dateInput.value = today;
        dateInput.addEventListener('change', loadNbrbRates);
        loadNbrbRates();
    }

    window.onload = async () => {
        initConfirmModal();
        initNbrbRatesWidget();
        await loadGroups();
        await loadCategories();
        loadResources();
    };
</script>
</body>
</html>
