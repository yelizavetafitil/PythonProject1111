<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #144080; --accent-soft: #1f4e92; --bg: #f3f6fb; }
        body {
            background: var(--bg);
            background-image: linear-gradient(rgba(9, 23, 52, 0.58), rgba(9, 23, 52, 0.58)), url("{{ url_for('project_asset', filename='back.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(3px);
            padding: 42px 40px;
            border-radius: 30px;
            box-shadow: 0 18px 38px rgba(6, 18, 43, 0.34);
            width: 100%;
            max-width: 460px;
            text-align: center;
            border: 1px solid rgba(221, 230, 243, 0.9);
        }
        .hub-logo-img { width: 360px; max-width: 100%; height: auto; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .auth-title { color: var(--accent); font-weight: 700; font-size: 20px; margin-bottom: 6px; }
        .auth-subtitle {
            color: #4b5f7a;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 auto 22px;
            width: 100%;
            text-align: center;
        }
        .login-field {
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 14px;
            border: 1px solid #dee2e6;
            background: #fafafa;
            padding: 0 16px;
            margin-bottom: 15px;
            text-align: left;
        }
        .login-field:focus-within {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(20,64,128,0.15);
        }
        .login-field-icon {
            flex-shrink: 0;
            display: flex;
            color: #94a3b8;
        }
        .login-field .form-control {
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            margin-bottom: 0;
            padding: 14px 0;
            flex: 1 1 auto;
            min-width: 0;
        }
        .login-field .form-control:focus { box-shadow: none !important; }
        /* Chrome/Safari: убрать жёлтый фон автозаполнения, в тон макету */
        .login-field .form-control:-webkit-autofill,
        .login-field .form-control:-webkit-autofill:hover,
        .login-field .form-control:-webkit-autofill:focus,
        .login-field .form-control:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #fafafa inset !important;
            box-shadow: 0 0 0 1000px #fafafa inset !important;
            -webkit-text-fill-color: #1e293b !important;
            caret-color: #1e293b;
            transition: background-color 99999s ease-out;
        }
        .login-field:focus-within .form-control:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #fff inset !important;
            box-shadow: 0 0 0 1000px #fff inset !important;
        }
        .btn-login { background: var(--accent); color: white; font-weight: 700; border-radius: 14px; padding: 14px; width: 100%; border: none; transition: 0.2s; font-size: 16px; }
        .btn-login:hover { background: var(--accent-soft); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(20,64,128,0.28); }
        .btn-login:focus { box-shadow: 0 0 0 3px rgba(20,64,128,0.18); }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .login-card { padding: 28px 22px; border-radius: 22px; }
            .auth-title { font-size: 18px; }
            .auth-subtitle { font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="login-card">
    <img class="hub-logo-img" src="{{ url_for('project_logo') }}" alt="Логотип РУП Белнипиэнергопром">
    <div class="auth-title">Авторизация</div>
    <div class="auth-subtitle"><span style="white-space: nowrap;">Авторизуйтесь на портале РУП&nbsp;«Белнипиэнергопром»,</span> чтобы получить доступ к внутренним ресурсам.</div>
    <div id="err" class="text-danger small mb-3 fw-bold" style="display:none;">Неверные учетные данные</div>
    <div class="login-field">
        <span class="login-field-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="u" name="username" autocomplete="username" class="form-control" placeholder="Имя пользователя">
    </div>
    <div class="login-field mb-4">
        <span class="login-field-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="p" name="password" autocomplete="current-password" class="form-control" placeholder="Пароль">
    </div>
    <button class="btn-login" onclick="login()">Войти</button>
</div>
<script>
    async function login() {
        const usernameInput = document.getElementById('u');
        const passwordInput = document.getElementById('p');
        const err = document.getElementById('err');
        const loginBtn = document.querySelector('.btn-login');
        const u = usernameInput.value;
        const p = passwordInput.value;
        err.style.display = 'none';
        err.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Проверка...';
        try {
            const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
            const data = await r.json().catch(() => ({}));
            if (r.ok && data.success) {
                location.href = '/';
                return;
            }
            err.textContent = data.error || 'Не удалось войти. Проверьте данные AD.';
            err.style.display = 'block';
        } catch (_) {
            err.textContent = 'Ошибка сети или сервера. Повторите попытку.';
            err.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Войти';
        }
    }
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
